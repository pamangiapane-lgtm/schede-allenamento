<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squadra — Schede Allenamento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Schede Allenamento</h1>
  <p>Tocca il tuo nome per accedere</p>
</header>

<div class="container">
  <p class="squadra-titolo">Giocatrici</p>
  <div id="lista-giocatrici">
    <p class="loading-msg">Caricamento...</p>
  </div>
</div>

<!-- MODAL PIN -->
<div id="pin-overlay" class="pin-overlay" style="display:none" onclick="chiudiPinSeEsterno(event)">
  <div class="pin-modal">
    <button class="pin-close" onclick="chiudiPin()">✕</button>
    <div class="pin-nome" id="pin-nome"></div>
    <div class="pin-dots" id="pin-dots">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="pin-errore" id="pin-errore"></div>
    <div class="pin-tastiera">
      <button onclick="pinDigit('1')">1</button>
      <button onclick="pinDigit('2')">2</button>
      <button onclick="pinDigit('3')">3</button>
      <button onclick="pinDigit('4')">4</button>
      <button onclick="pinDigit('5')">5</button>
      <button onclick="pinDigit('6')">6</button>
      <button onclick="pinDigit('7')">7</button>
      <button onclick="pinDigit('8')">8</button>
      <button onclick="pinDigit('9')">9</button>
      <button class="pin-empty"></button>
      <button onclick="pinDigit('0')">0</button>
      <button class="pin-del" onclick="pinCancella()">⌫</button>
    </div>
  </div>
</div>

<script>
const API   = 'https://script.google.com/macros/s/AKfycbyxLzbnm_LcBDYrB1_hBdCD6HxvOxA7__lXHe7_xmbe2kynoGNA_oDDh954zR3RIzr9/exec';
const TOKEN = 'squadra2026';

let pinCorrente = '';
let giocatriceAttiva = null;

async function caricaGiocatrici() {
  const lista = document.getElementById('lista-giocatrici');
  try {
    const res  = await fetch(`${API}?token=${TOKEN}&azione=leggi&foglio=Giocatrici`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.errore);
    lista.innerHTML = '';
    json.dati.forEach(g => {
      const div = document.createElement('div');
      div.className = 'giocatrice-card';
      div.innerHTML = `
        <span class="numero-maglia">${g.Numero}</span>
        <div class="giocatrice-info">
          <strong>${g.Nome}</strong>
          ${g.Ruolo ? `<span>${g.Ruolo}</span>` : ''}
        </div>
        <span class="arrow">›</span>
      `;
      div.onclick = () => apriPin(g);
      lista.appendChild(div);
    });
  } catch (err) {
    lista.innerHTML = `<p class="errore-msg">Errore nel caricamento dati. Riprova.</p>`;
  }
}

function apriPin(g) {
  giocatriceAttiva = g;
  pinCorrente = '';
  document.getElementById('pin-nome').textContent = g.Nome;
  document.getElementById('pin-errore').textContent = '';
  aggiornaDots();
  document.getElementById('pin-overlay').style.display = 'flex';
}

function chiudiPin() {
  document.getElementById('pin-overlay').style.display = 'none';
  giocatriceAttiva = null;
  pinCorrente = '';
}

function chiudiPinSeEsterno(e) {
  if (e.target === document.getElementById('pin-overlay')) chiudiPin();
}

function aggiornaDots() {
  const dots = document.querySelectorAll('#pin-dots span');
  dots.forEach((d, i) => d.classList.toggle('filled', i < pinCorrente.length));
}

function pinDigit(d) {
  if (pinCorrente.length >= 4) return;
  pinCorrente += d;
  aggiornaDots();
  if (pinCorrente.length === 4) verificaPin();
}

function pinCancella() {
  pinCorrente = pinCorrente.slice(0, -1);
  document.getElementById('pin-errore').textContent = '';
  aggiornaDots();
}

function verificaPin() {
  const g = giocatriceAttiva;
  if (!g) return;
  const pinAtteso = String(g.PIN);
  if (pinCorrente === pinAtteso) {
    sessionStorage.setItem('auth_' + g.ID, '1');
    window.location.href = `scheda.html?id=${g.ID}`;
  } else {
    const modal = document.querySelector('.pin-modal');
    modal.classList.add('pin-shake');
    setTimeout(() => modal.classList.remove('pin-shake'), 500);
    document.getElementById('pin-errore').textContent = 'PIN errato, riprova';
    pinCorrente = '';
    aggiornaDots();
  }
}

// Supporto tastiera fisica
document.addEventListener('keydown', e => {
  if (document.getElementById('pin-overlay').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') pinDigit(e.key);
  else if (e.key === 'Backspace') pinCancella();
  else if (e.key === 'Escape') chiudiPin();
});

caricaGiocatrici();
</script>

</body>
</html>
