<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[DEV] Squadra — Schede Allenamento</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a3a6b">
  <link rel="apple-touch-icon" href="logo.jpg">
</head>
<body>

<header>
  <div class="header-brand">
    <img src="logo.jpg" class="site-logo" alt="Marsala Volley">
    <h1>Schede Allenamento</h1>
  </div>
  <p>Tocca il tuo nome per accedere</p>
  <div style="background:#e8a000;color:#fff;font-size:0.75rem;font-weight:700;letter-spacing:1px;padding:3px 0;margin-top:6px;">⚠ AMBIENTE DI TEST — NON UFFICIALE</div>
</header>

<div class="container">
  <div class="link-app-card" onclick="copiaLink(this)">
    <div class="link-app-label">Link web app</div>
    <div class="link-app-url">pamangiapane-lgtm.github.io/schede-allenamento/</div>
    <div class="link-app-cta" id="link-cta">Tocca per copiare</div>
  </div>
  <p class="squadra-titolo">Giocatrici</p>
  <div id="lista-giocatrici">
    <p class="loading-msg">Caricamento...</p>
  </div>
  <div id="install-banner" class="install-banner" style="display:none">
    <hr class="install-divider">
    <div class="install-card">
      <div class="install-icon">📲</div>
      <p class="install-title">Installa l'app</p>
      <p class="install-sub">Accesso rapido dalla schermata Home del tuo telefono</p>
      <button id="install-btn">Aggiungi alla schermata Home</button>
    </div>
  </div>
</div>


<script>
const API   = 'https://script.google.com/macros/s/AKfycbzq2km30SYxJVeEF6UzT16raAoN06Ghx-MURyLjTqra-6SctVjAfp_wbNwdH4WuNOiO/exec';
const TOKEN = 'squadra2026-dev'; // ← staging token (foglio DEV)

async function caricaGiocatrici() {
  const lista = document.getElementById('lista-giocatrici');
  try {
    const res  = await fetch(`${API}?token=${TOKEN}&azione=leggi&foglio=Giocatrici`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.errore);
    lista.innerHTML = '';
    json.dati.filter(g => !isNaN(parseInt(g.ID))).sort((a, b) => a.Nome.localeCompare(b.Nome, 'it', {sensitivity:'base'})).forEach(g => {
      const div = document.createElement('div');
      div.className = 'giocatrice-card';
      div.innerHTML = `
        <div class="giocatrice-info">
          <strong>${g.Nome}</strong>
          ${g.Ruolo ? `<span>${g.Ruolo}</span>` : ''}
        </div>
        <span class="arrow">›</span>
      `;
      div.onclick = () => { window.location.href = `scheda.html?id=${g.ID}`; };
      lista.appendChild(div);
    });
  } catch (err) {
    lista.innerHTML = `<p class="errore-msg">Errore nel caricamento dati. Riprova.</p>`;
  }
}

function copiaLink(el) {
  const url = 'https://pamangiapane-lgtm.github.io/schede-allenamento/';
  const cta = el.querySelector('#link-cta');
  navigator.clipboard.writeText(url).then(() => {
    cta.textContent = '✓ Link copiato!';
    setTimeout(() => { cta.textContent = 'Tocca per copiare'; }, 2000);
  }).catch(() => {
    cta.textContent = url;
  });
}

caricaGiocatrici();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
});
</script>

</body>
</html>
