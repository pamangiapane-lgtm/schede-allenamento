<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Progressi — Coach</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#1a3a6b">
  <link rel="apple-touch-icon" href="logo.jpg">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .report-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      background: var(--surface, #f5f7fa);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .report-controls select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border, #dde1e9);
      font-size: 0.9rem;
      background: #fff;
      color: var(--text, #1a1a2e);
      flex: 1;
      min-width: 140px;
    }
    .pdf-btn {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      background: var(--primary, #1a3a6b);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .pdf-btn:active { opacity: 0.85; }

    .summary-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .summary-chip {
      background: var(--surface, #f5f7fa);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.82rem;
      color: var(--text-light, #555);
    }
    .summary-chip strong {
      display: block;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary, #1a3a6b);
      line-height: 1.1;
    }

    .player-section { margin-bottom: 32px; }
    .player-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--primary, #1a3a6b);
      border-bottom: 2px solid var(--primary, #1a3a6b);
      padding-bottom: 6px;
      margin-bottom: 14px;
    }

    .exercise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .exercise-card {
      background: var(--surface, #f5f7fa);
      border-radius: 10px;
      padding: 14px;
    }
    .ex-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text, #1a1a2e);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .ex-last {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--primary, #1a3a6b);
      line-height: 1;
    }
    .ex-trend {
      font-size: 0.78rem;
      margin-top: 3px;
    }
    .trend-up { color: #2a9d3a; }
    .trend-dn { color: #c33; }
    .trend-eq { color: var(--text-light, #888); }
    .ex-chart { margin-top: 10px; height: 72px; position: relative; }
    .ex-count {
      font-size: 0.72rem;
      color: var(--text-light, #888);
      margin-top: 5px;
    }

    .no-data {
      color: var(--text-light, #888);
      font-style: italic;
      font-size: 0.9rem;
      padding: 12px 0;
    }

    .feedback-summary {
      margin-top: 16px;
      padding: 12px 14px;
      background: var(--surface, #f5f7fa);
      border-radius: 10px;
    }
    .feedback-summary-title {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-light, #555);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .feedback-row-report {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 4px;
    }
    .feedback-val { font-weight: 700; }

    /* ── COMPLIANCE SECTION ── */
    .compliance-wrap {
      background: var(--surface, #f5f7fa);
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .compliance-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      cursor: pointer;
      user-select: none;
    }
    .compliance-hdr h3 {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light, #555);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cmp-urgenti {
      background: #fee2e2;
      color: #c33;
      border-radius: 4px;
      padding: 1px 8px;
      font-size: 0.73rem;
      font-weight: 700;
    }
    .compliance-toggle { font-size: 0.78rem; color: var(--text-light, #888); }
    .compliance-body { padding: 0 16px 12px; }
    .cmp-head-row {
      display: flex;
      gap: 8px;
      padding: 0 0 6px;
      font-size: 0.72rem;
      color: var(--text-light, #888);
      border-bottom: 1px solid var(--border, #dde1e9);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .cmp-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border, #dde1e9);
      font-size: 0.83rem;
    }
    .cmp-row:last-child { border: none; }
    .cmp-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cmp-ok   .cmp-dot { background: #2a9d3a; }
    .cmp-warn .cmp-dot { background: #e6a817; }
    .cmp-red  .cmp-dot { background: #c33; }
    .cmp-mai  .cmp-dot { background: #bbb; }
    .cmp-name { flex: 1; font-weight: 600; color: var(--text, #1a1a2e); }
    .cmp-days { width: 75px; text-align: right; color: var(--text-light, #888); font-size: 0.8rem; }
    .cmp-days.rd { color: #c33; font-weight: 700; }
    .cmp-days.wn { color: #e6a817; font-weight: 700; }
    .cmp-sed  { width: 65px; text-align: right; font-size: 0.78rem; color: var(--text-light, #888); }
    .cmp-rpe  { width: 58px; text-align: right; font-size: 0.78rem; color: var(--text-light, #888); }
    .cmp-rpe.hi  { color: #c33; font-weight: 700; }
    .cmp-rpe.med { color: #e6a817; font-weight: 600; }

    /* ── TABELLA ATLETE ── */
    #report-content { overflow-x: auto; }
    .atleta-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.83rem;
    }
    .atleta-table thead th {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light, #888);
      padding: 6px 10px;
      text-align: left;
      border-bottom: 2px solid var(--border, #dde1e9);
      white-space: nowrap;
    }
    .atleta-table tbody tr {
      border-bottom: 1px solid var(--border, #dde1e9);
    }
    .atleta-table tbody tr:last-child { border-bottom: none; }
    .atleta-table td {
      padding: 7px 10px;
      vertical-align: middle;
      white-space: nowrap;
    }
    .atleta-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; vertical-align: middle; }
    .atleta-nome { font-weight: 700; color: var(--text, #1a1a2e); }
    .atleta-ruolo { font-weight: 400; font-size: 0.75rem; opacity: 0.55; margin-left: 4px; }
    .atleta-last { font-size: 0.75rem; font-weight: 700; }
    .stat-num { font-weight: 700; color: var(--primary, #1a3a6b); }
    .stat-sub { font-size: 0.65rem; color: var(--text-light, #999); margin-left: 2px; }
    .td-note { width: 180px; }
    .note-input {
      width: 100%;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1.5px solid var(--border, #dde1e9);
      background: var(--surface, #f5f7fa);
      color: var(--text, #1a1a2e);
      font-size: 0.78rem;
      font-family: inherit;
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .note-input:focus { outline: none; }
    .note-input.pos:focus  { border-color: #2a9d3a; }
    .note-input.crit:focus { border-color: #c33; }
    .note-staff-save-btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: none;
      background: var(--primary, #1a3a6b);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .note-staff-save-btn:active { opacity: 0.8; }
    .note-staff-feedback {
      font-size: 0.72rem;
      color: #2a9d3a;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      display: block;
    }
    .note-staff-feedback.visible { opacity: 1; }

    @media print {
      header, .report-controls, .back-link, .install-banner { display: none !important; }
      .summary-bar { margin-bottom: 12px; }
      .exercise-grid { grid-template-columns: repeat(3, 1fr); }
      .exercise-card { break-inside: avoid; border: 1px solid #ddd; background: #fff !important; }
      .player-section { break-inside: avoid; }
      body, .container { background: #fff !important; }
      .summary-chip { border: 1px solid #ddd; background: #fff !important; }
      .note-staff-save-row { display: none !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
    <img src="logo.jpg" class="site-logo" alt="Marsala Volley">
    <h1>Report Progressi</h1>
  </div>
  <div style="background:#e8a000;color:#fff;font-size:0.75rem;font-weight:700;letter-spacing:1px;padding:3px 0;margin-top:6px;">⚠ AMBIENTE DI TEST — NON UFFICIALE</div>
</header>

<div class="container">
  <a class="back-link" href="index.html">← Tutte le giocatrici</a>

  <div id="access-denied" style="display:none">
    <p class="errore-msg" style="margin-top:32px;">Accesso non autorizzato.<br><small>Questo report è riservato allo staff tecnico.</small></p>
  </div>

  <div id="loading" class="loading-msg">Caricamento dati...</div>

  <div id="contenuto" style="display:none">
    <div class="report-controls">
      <select id="sel-giocatrice" onchange="renderReport()">
        <option value="all">Tutte le giocatrici</option>
      </select>
      <select id="sel-periodo" onchange="renderReport()">
        <option value="all">Tutto il periodo</option>
        <option value="30">Ultimo mese</option>
        <option value="7">Ultima settimana</option>
      </select>
      <button class="pdf-btn" onclick="window.print()">⬇ Esporta PDF</button>
    </div>

    <div id="summary-bar" class="summary-bar"></div>
    <div id="compliance-section"></div>
    <div id="wellness-section"></div>
    <div id="report-content"></div>
  </div>
</div>

<script>
const API       = 'https://script.google.com/macros/s/AKfycbzq2km30SYxJVeEF6UzT16raAoN06Ghx-MURyLjTqra-6SctVjAfp_wbNwdH4WuNOiO/exec';
const TOKEN     = 'mv26-dev-9kR4tLqB';
const COACH_KEY = 'mv26-coach-8pL2wK';
const SKIP      = new Set(['RPE-seduta', 'Fatica-seduta', 'Peso-corporeo']);

let allGiocatrici  = [];
let allProgressi   = [];
let allWellness    = [];
let allNoteStaff   = {};
let chartInstances = [];

const params = new URLSearchParams(window.location.search);
if (params.get('coach') !== COACH_KEY) {
  document.getElementById('loading').style.display      = 'none';
  document.getElementById('access-denied').style.display = 'block';
} else {
  init();
}

async function fetchSheet(foglio) {
  const r = await fetch(`${API}?token=${TOKEN}&azione=leggi&foglio=${foglio}`);
  return r.json();
}

async function init() {
  try {
    const [resG, resP, resW, resNS] = await Promise.all([
      fetchSheet('Giocatrici'),
      fetchSheet('Progressi'),
      fetchSheet('Wellness'),
      fetch(`${API}?token=${TOKEN}&azione=leggi_note_staff`).then(r => r.json()).catch(() => ({note:[]})),
    ]);

    allGiocatrici = (resG.dati || []).filter(g => !isNaN(parseInt(g.ID)));
    allProgressi  = (resP.dati || []);
    allWellness   = (resW.dati || []);
    allNoteStaff  = {};
    (resNS.note || []).forEach(n => { allNoteStaff[n.id] = n; });

    const sel = document.getElementById('sel-giocatrice');
    allGiocatrici
      .sort((a, b) => a.Nome.localeCompare(b.Nome, 'it'))
      .forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.ID;
        opt.textContent = g.Nome;
        sel.appendChild(opt);
      });

    document.getElementById('loading').style.display   = 'none';
    document.getElementById('contenuto').style.display = '';
    renderReport();
  } catch {
    document.getElementById('loading').innerHTML =
      `<p class="errore-msg">Errore nel caricamento. Riprova.</p>`;
  }
}

function filterByPeriodo(progressi) {
  const days = parseInt(document.getElementById('sel-periodo').value) || 0;
  if (!days) return progressi;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  return progressi.filter(p => {
    const ts = p.Timestamp ? new Date(p.Timestamp) : null;
    return ts && ts >= cutoff;
  });
}

function parseKg(valore) {
  const m = String(valore || '').match(/(\d+(?:\.\d+)?)\s*kg/i);
  return m ? parseFloat(m[1]) : null;
}

function formatData(raw) {
  if (!raw) return '';
  if (typeof raw === 'string' && raw.includes('/')) return raw;
  const d = new Date(raw);
  if (isNaN(d)) return String(raw);
  return `${d.getDate()}/${d.getMonth() + 1}`;
}

function renderCompliance() {
  const wrap = document.getElementById('compliance-section');
  const selId = document.getElementById('sel-giocatrice').value;
  if (selId !== 'all') { wrap.innerHTML = ''; return; }

  const now = new Date();
  const dayOfWeek = now.getDay(); // 0=dom, 1=lun...
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - ((dayOfWeek === 0 ? 7 : dayOfWeek) - 1));
  startOfWeek.setHours(0, 0, 0, 0);
  const startOfLastWeek = new Date(startOfWeek);
  startOfLastWeek.setDate(startOfWeek.getDate() - 7);

  const rows = allGiocatrici.map(g => {
    const allLogs = allProgressi.filter(p =>
      String(p.ID_Giocatrice) === String(g.ID) && p.Valore
    );
    const logs = allLogs.filter(p => !SKIP.has(p.Esercizio));

    let lastTs = null;
    logs.forEach(p => {
      const ts = p.Timestamp ? new Date(p.Timestamp) : null;
      if (ts && (!lastTs || ts > lastTs)) lastTs = ts;
    });

    const daysSince = lastTs
      ? Math.floor((now - lastTs) / 86400000)
      : null;

    // Sedute settimana corrente (lunedì → oggi)
    const sedWeek = new Set(
      logs.filter(p => {
        const ts = p.Timestamp ? new Date(p.Timestamp) : null;
        return ts && ts >= startOfWeek;
      }).map(p => p.N_Seduta)
    ).size;

    // Sedute settimana scorsa
    const sedLastWeek = new Set(
      logs.filter(p => {
        const ts = p.Timestamp ? new Date(p.Timestamp) : null;
        return ts && ts >= startOfLastWeek && ts < startOfWeek;
      }).map(p => p.N_Seduta)
    ).size;

    // RPE medio settimana corrente (usa allLogs per includere RPE-seduta che è in SKIP)
    const rpeWeek = allLogs.filter(p =>
      p.Esercizio === 'RPE-seduta' && p.Valore &&
      (() => { const ts = p.Timestamp ? new Date(p.Timestamp) : null; return ts && ts >= startOfWeek; })()
    ).map(p => Number(p.Valore)).filter(v => !isNaN(v));
    const rpeMedia = rpeWeek.length
      ? (rpeWeek.reduce((a, b) => a + b, 0) / rpeWeek.length).toFixed(1)
      : null;

    let status;
    if (daysSince === null)    status = 'mai';
    else if (daysSince > 7)    status = 'red';
    else if (daysSince > 3)    status = 'warn';
    else                       status = 'ok';

    let lastLabel;
    if (daysSince === null)    lastLabel = 'mai';
    else if (daysSince === 0)  lastLabel = 'oggi';
    else if (daysSince === 1)  lastLabel = 'ieri';
    else                       lastLabel = `${daysSince}gg fa`;

    return { g, status, lastLabel, daysSince, sedWeek, sedLastWeek, rpeMedia };
  });

  const order = { mai: 0, red: 1, warn: 2, ok: 3 };
  rows.sort((a, b) => order[a.status] - order[b.status]);

  const urgenti = rows.filter(r => r.status === 'mai' || r.status === 'red').length;
  const open = urgenti > 0;

  const urgBadge = urgenti > 0
    ? `<span class="cmp-urgenti">${urgenti} urgenti</span>`
    : `<span style="color:#2a9d3a;font-size:0.75rem;font-weight:700">✓ tutte nei tempi</span>`;

  let rowsHtml = rows.map(r => {
    const dc = r.status === 'red' ? 'rd' : r.status === 'warn' ? 'wn' : '';
    const sedDiff = r.sedWeek - r.sedLastWeek;
    const sedArrow = sedDiff > 0 ? ` <span style="color:#2a9d3a">↑</span>`
                   : sedDiff < 0 ? ` <span style="color:#c33">↓</span>` : '';
    const rpeClass = r.rpeMedia >= 8 ? 'hi' : r.rpeMedia >= 6 ? 'med' : '';
    return `
      <div class="cmp-row cmp-${r.status}">
        <span class="cmp-dot"></span>
        <span class="cmp-name">${r.g.Nome}</span>
        <span class="cmp-days ${dc}">${r.lastLabel}</span>
        <span class="cmp-sed">${r.sedWeek}${sedArrow}</span>
        <span class="cmp-rpe ${rpeClass}">${r.rpeMedia !== null ? r.rpeMedia : '—'}</span>
      </div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="compliance-wrap">
      <div class="compliance-hdr" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.compliance-toggle').textContent=this.nextElementSibling.style.display==='none'?'▼ espandi':'▲ chiudi'">
        <h3>📋 Compliance settimanale ${urgBadge}</h3>
        <span class="compliance-toggle">${open ? '▲ chiudi' : '▼ espandi'}</span>
      </div>
      <div class="compliance-body" style="display:${open ? 'block' : 'none'}">
        <div class="cmp-head-row">
          <span style="width:9px;flex-shrink:0"></span>
          <span style="flex:1">Atleta</span>
          <span style="width:75px;text-align:right">Ultimo log</span>
          <span style="width:65px;text-align:right">Sed. (sett.)</span>
          <span style="width:58px;text-align:right">RPE medio</span>
        </div>
        ${rowsHtml}
      </div>
    </div>`;
}

function renderWellness() {
  const wrap = document.getElementById('wellness-section');
  if (!allWellness.length) { wrap.innerHTML = ''; return; }

  const selId = document.getElementById('sel-giocatrice').value;
  const days = parseInt(document.getElementById('sel-periodo').value) || 0;
  const cutoff = days ? new Date(new Date().setDate(new Date().getDate() - days)) : null;
  const wData = cutoff
    ? allWellness.filter(w => { const ts = w.Timestamp ? new Date(w.Timestamp) : null; return ts && ts >= cutoff; })
    : allWellness;

  const sonnoClass  = v => !v ? '' : v >= 4 ? 'ok' : v >= 3 ? 'warn' : 'bad';
  const doloriClass = v => !v ? '' : v <= 2 ? 'ok' : v <= 3 ? 'warn' : 'bad';
  const avg = arr => arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1) : null;

  if (selId === 'all') {
    const rows = allGiocatrici.map(g => {
      const entries = wData.filter(w => String(w.ID_Giocatrice) === String(g.ID));
      if (!entries.length) return null;
      const sonno   = avg(entries.map(e => Number(e.Qualita_Sonno)).filter(v => !isNaN(v) && v));
      const dolori  = avg(entries.map(e => Number(e.Dolori)).filter(v => !isNaN(v) && v));
      const energia = avg(entries.map(e => Number(e.Energia)).filter(v => !isNaN(v) && v));
      const lastNote = [...entries].reverse().find(e => e.Note)?.Note || '';
      const anomalia = entries.some(e => Number(e.Qualita_Sonno) <= 2 || Number(e.Dolori) >= 4 || Number(e.Energia) <= 2);
      return { g, count: entries.length, sonno, dolori, energia, note: lastNote, anomalia };
    }).filter(Boolean);

    if (!rows.length) { wrap.innerHTML = ''; return; }

    const totAnom = rows.filter(r => r.anomalia).length;
    const badge = totAnom > 0
      ? `<span class="cmp-urgenti">${totAnom} con anomalie</span>`
      : `<span style="color:#2a9d3a;font-size:0.75rem;font-weight:700">✓ nessuna anomalia</span>`;
    const open = totAnom > 0;

    const rowsHtml = rows.map(r => `
      <div class="cmp-row">
        <span class="cmp-name">${r.g.Nome}</span>
        <span class="wl-val ${sonnoClass(parseFloat(r.sonno))}">${r.sonno ?? '—'}</span>
        <span class="wl-val ${doloriClass(parseFloat(r.dolori))}">${r.dolori ?? '—'}</span>
        <span class="wl-val ${sonnoClass(parseFloat(r.energia))}">${r.energia ?? '—'}</span>
        <span class="wl-note">${r.note ? '📝 ' + r.note : ''}</span>
      </div>`).join('');

    wrap.innerHTML = `
      <div class="compliance-wrap">
        <div class="compliance-hdr" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.compliance-toggle').textContent=this.nextElementSibling.style.display==='none'?'▼ espandi':'▲ chiudi'">
          <h3>💚 Wellness squadra ${badge}</h3>
          <span class="compliance-toggle">${open ? '▲ chiudi' : '▼ espandi'}</span>
        </div>
        <div class="compliance-body" style="display:${open ? 'block' : 'none'}">
          <div class="cmp-head-row">
            <span style="flex:1">Atleta</span>
            <span style="width:58px;text-align:right">🌙 Sonno</span>
            <span style="width:58px;text-align:right">💢 Dolori</span>
            <span style="width:58px;text-align:right">⚡ Energia</span>
            <span style="flex:2;padding-left:6px">Ultima nota</span>
          </div>
          ${rowsHtml}
        </div>
      </div>`;
  } else {
    const entries = wData
      .filter(w => String(w.ID_Giocatrice) === selId)
      .sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp))
      .slice(0, 10);

    if (!entries.length) { wrap.innerHTML = ''; return; }

    const fmtDate = ts => { const d = new Date(ts); return `${d.getDate()}/${d.getMonth()+1}`; };

    const rowsHtml = entries.map(e => {
      const s = Number(e.Qualita_Sonno), dl = Number(e.Dolori), en = Number(e.Energia);
      return `
        <div class="cmp-row">
          <span style="width:38px;font-size:0.78rem;color:var(--text-light)">${e.Data || fmtDate(e.Timestamp)}</span>
          <span class="wl-val ${sonnoClass(s)}">${s || '—'}</span>
          <span class="wl-val ${doloriClass(dl)}">${dl || '—'}</span>
          <span class="wl-val ${sonnoClass(en)}">${en || '—'}</span>
          <span class="wl-note">${e.Note ? '📝 ' + e.Note : ''}</span>
        </div>`;
    }).join('');

    wrap.innerHTML = `
      <div class="compliance-wrap">
        <div class="compliance-hdr" style="cursor:default">
          <h3>💚 Wellness personale</h3>
          <span></span>
        </div>
        <div class="compliance-body">
          <div class="cmp-head-row">
            <span style="width:38px">Data</span>
            <span style="width:58px;text-align:right">🌙 Sonno</span>
            <span style="width:58px;text-align:right">💢 Dolori</span>
            <span style="width:58px;text-align:right">⚡ Energia</span>
            <span style="flex:2;padding-left:6px">Note</span>
          </div>
          ${rowsHtml}
        </div>
      </div>`;
  }
}

function renderReport() {
  chartInstances.forEach(c => c.destroy());
  chartInstances = [];

  document.getElementById('compliance-section').innerHTML = '';
  document.getElementById('wellness-section').innerHTML  = '';

  const selId  = document.getElementById('sel-giocatrice').value;
  const days   = parseInt(document.getElementById('sel-periodo').value) || 0;
  const now    = new Date();
  const cutoff = days ? new Date(now.getTime() - days * 86400000) : null;

  const startOfWeek = new Date(now);
  const dow = startOfWeek.getDay();
  startOfWeek.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  startOfWeek.setHours(0, 0, 0, 0);

  const avg = arr => arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1) : null;
  const filterTs = arr => cutoff ? arr.filter(p => { const ts = p.Timestamp ? new Date(p.Timestamp) : null; return ts && ts >= cutoff; }) : arr;

  const giocatrici = selId === 'all' ? allGiocatrici : allGiocatrici.filter(g => String(g.ID) === selId);

  const progressiFiltrati = filterTs(allProgressi);
  const attivi = new Set(progressiFiltrati.filter(p => !SKIP.has(p.Esercizio) && p.Valore).map(p => p.ID_Giocatrice));
  const sedTotSquadra = new Set(progressiFiltrati.filter(p => !SKIP.has(p.Esercizio) && p.Valore).map(p => p.N_Seduta)).size;

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-chip"><strong>${attivi.size}/${allGiocatrici.length}</strong>atlete attive</div>
    <div class="summary-chip"><strong>${sedTotSquadra}</strong>sedute totali (periodo)</div>
  `;

  const content = document.getElementById('report-content');
  content.innerHTML = '';

  const table = document.createElement('table');
  table.className = 'atleta-table';
  table.innerHTML = `<thead><tr>
    <th>Atleta</th>
    <th>Ultima</th>
    <th>Sed. sett.</th>
    <th>Sed. tot.</th>
    <th>RPE</th>
    <th>Fatica</th>
    <th>🌙</th><th>💢</th><th>⚡</th>
    <th>✅</th>
    <th>⚠️</th>
    <th></th>
  </tr></thead>`;
  const tbody = document.createElement('tbody');

  giocatrici.forEach(g => {
    const id = String(g.ID);

    /* workload */
    const logsG    = allProgressi.filter(p => String(p.ID_Giocatrice) === id && !SKIP.has(p.Esercizio) && p.Valore);
    const logsGFil = filterTs(logsG);
    const sedTot   = new Set(logsGFil.map(p => p.N_Seduta)).size;
    const sedWeek  = new Set(logsG.filter(p => { const ts = p.Timestamp ? new Date(p.Timestamp) : null; return ts && ts >= startOfWeek; }).map(p => p.N_Seduta)).size;

    let ultimoTs = null;
    logsG.forEach(p => { const ts = p.Timestamp ? new Date(p.Timestamp) : null; if (ts && (!ultimoTs || ts > ultimoTs)) ultimoTs = ts; });
    const daysSince = ultimoTs ? Math.floor((now - ultimoTs) / 86400000) : null;
    const lastLabel = daysSince === null ? 'mai' : daysSince === 0 ? 'oggi' : daysSince === 1 ? 'ieri' : `${daysSince}gg fa`;
    const status    = daysSince === null ? 'mai' : daysSince > 7 ? 'red' : daysSince > 3 ? 'warn' : 'ok';
    const dotColor  = status === 'ok' ? '#2a9d3a' : status === 'warn' ? '#e6a817' : '#c33';
    const lastColor = status === 'ok' ? '#2a9d3a' : status === 'warn' ? '#e6a817' : '#c33';

    /* intensità */
    const allG   = filterTs(allProgressi.filter(p => String(p.ID_Giocatrice) === id));
    const rpeV   = allG.filter(p => p.Esercizio === 'RPE-seduta'    && p.Valore).map(p => Number(p.Valore)).filter(v => !isNaN(v));
    const fatV   = allG.filter(p => p.Esercizio === 'Fatica-seduta' && p.Valore).map(p => Number(p.Valore)).filter(v => !isNaN(v));
    const rpe    = avg(rpeV);
    const fat    = avg(fatV);
    const rpeCol = !rpe ? '#aaa' : parseFloat(rpe) >= 8 ? '#c33' : parseFloat(rpe) >= 6 ? '#e6a817' : '#2a9d3a';

    /* wellness */
    const wG      = filterTs(allWellness.filter(w => String(w.ID_Giocatrice) === id));
    const sonno   = avg(wG.map(w => Number(w.Qualita_Sonno)).filter(v => !isNaN(v) && v));
    const dolori  = avg(wG.map(w => Number(w.Dolori)).filter(v => !isNaN(v) && v));
    const energia = avg(wG.map(w => Number(w.Energia)).filter(v => !isNaN(v) && v));
    const sCol = !sonno  ? '#aaa' : parseFloat(sonno)  >= 4 ? '#2a9d3a' : parseFloat(sonno)  >= 3 ? '#e6a817' : '#c33';
    const dCol = !dolori ? '#aaa' : parseFloat(dolori) <= 2 ? '#2a9d3a' : parseFloat(dolori) <= 3 ? '#e6a817' : '#c33';
    const eCol = !energia? '#aaa' : parseFloat(energia) >= 4 ? '#2a9d3a' : parseFloat(energia)>= 3 ? '#e6a817' : '#c33';

    /* note staff */
    const nota = allNoteStaff[id] || {};

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="atleta-dot" style="background:${dotColor}"></span><span class="atleta-nome">${g.Nome}${g.Ruolo ? `<span class="atleta-ruolo">${g.Ruolo}</span>` : ''}</span></td>
      <td><span class="atleta-last" style="color:${lastColor}">${lastLabel}</span></td>
      <td><span class="stat-num">${sedWeek}</span></td>
      <td><span class="stat-num">${sedTot}</span></td>
      <td><span class="stat-num" style="color:${rpeCol}">${rpe ?? '—'}</span></td>
      <td><span class="stat-num">${fat ?? '—'}</span></td>
      <td><span class="stat-num" style="color:${sCol}">${sonno ?? '—'}</span></td>
      <td><span class="stat-num" style="color:${dCol}">${dolori ?? '—'}</span></td>
      <td><span class="stat-num" style="color:${eCol}">${energia ?? '—'}</span></td>
      <td class="td-note"><input class="note-input pos" id="note-pos-${id}" value="${(nota.positivo || '').replace(/"/g, '&quot;')}" placeholder="Cosa va..."></td>
      <td class="td-note"><input class="note-input crit" id="note-crit-${id}" value="${(nota.critico || '').replace(/"/g, '&quot;')}" placeholder="Da lavorare..."></td>
      <td><button class="note-staff-save-btn" onclick="salvaNota('${id}')">Salva</button><span class="note-staff-feedback" id="note-fb-${id}">✓</span></td>`;
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  content.appendChild(table);
}

async function salvaNota(id) {
  const pos  = document.getElementById(`note-pos-${id}`)?.value  || '';
  const crit = document.getElementById(`note-crit-${id}`)?.value || '';
  const fb   = document.getElementById(`note-fb-${id}`);
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, azione: 'scrivi_nota_staff', id_giocatrice: id, positivo: pos, critico: crit }),
    });
    const json = await res.json();
    if (json.ok) {
      allNoteStaff[id] = { id, positivo: pos, critico: crit };
      if (fb) { fb.classList.add('visible'); setTimeout(() => fb.classList.remove('visible'), 2000); }
    }
  } catch {}
}
</script>
