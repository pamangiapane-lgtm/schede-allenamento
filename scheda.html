<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scheda Giocatrice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Schede Allenamento</h1>
</header>

<div class="container">

  <a class="back-link" href="index.html">← Tutte le giocatrici</a>

  <div id="loading" class="loading-msg">Caricamento scheda...</div>

  <div id="contenuto" style="display:none">

    <!-- HERO -->
    <div class="scheda-hero">
      <div class="hero-numero" id="hero-numero">#</div>
      <div class="hero-info">
        <h2 id="hero-nome"></h2>
        <p id="hero-ruolo"></p>
      </div>
    </div>

    <!-- TAB -->
    <div class="tabs">
      <button class="tab-btn active" onclick="mostraSezione('individuale', this)">Individuale</button>
      <button class="tab-btn" onclick="mostraSezione('sedute', this)">Sedute</button>
      <button class="tab-btn" onclick="mostraSezione('profilo', this)">Profilo</button>
    </div>

    <!-- SEZIONE INDIVIDUALE -->
    <div id="individuale" class="sezione active"></div>

    <!-- SEZIONE SEDUTE -->
    <div id="sedute" class="sezione"></div>

    <!-- SEZIONE PROFILO -->
    <div id="profilo" class="sezione"></div>

  </div><!-- fine contenuto -->

</div><!-- fine container -->

<script>
const API        = 'https://script.google.com/macros/s/AKfycbyxLzbnm_LcBDYrB1_hBdCD6HxvOxA7__lXHe7_xmbe2kynoGNA_oDDh954zR3RIzr9/exec';
const TOKEN      = 'squadra2026';
const id         = new URLSearchParams(window.location.search).get('id');
let   ultimiLog  = {}; // { esercizio: { valore, rm } }
let   feedbackLog = {}; // { nSeduta: { 'RPE-seduta': val, 'Fatica-seduta': val } }

/* ---------- helpers ---------- */
function param(label, val) {
  return `<div class="param"><div class="param-label">${label}</div><div class="param-value">${val}</div></div>`;
}

function parseIntensita(s) {
  if (!s) return null;
  const m = String(s).match(/(\d+(?:\.\d+)?)\s*%/);
  return m ? parseFloat(m[1]) / 100 : null;
}

function parseReps(s) {
  if (!s) return null;
  const m = String(s).match(/\d+/);
  return m ? parseInt(m[0]) : null;
}

function formatData(s) {
  if (!s) return '—';
  const mesi = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
  let d, mo;
  if (typeof s === 'string' && s.includes('/')) {
    const p = s.split('/'); d = +p[0]; mo = +p[1] - 1;
  } else {
    const dt = new Date(s); d = dt.getDate(); mo = dt.getMonth();
  }
  return isNaN(d) ? String(s) : `${d} ${mesi[mo] || ''}`;
}

function logField(logId, esercizio, nSeduta, intensita, catena, repsStr) {
  const ultima       = ultimiLog[esercizio];
  const intensitaPct = parseIntensita(intensita);
  const reps         = parseReps(repsStr);

  const ultimaHtml = ultima
    ? `<div class="ultima-seduta">Ultima: <em>${ultima.valore}</em>${ultima.rm ? ` · RM ~${ultima.rm} kg` : ''}</div>`
    : '';

  return `
    <div class="log-compact">
      ${ultimaHtml}
      <div class="log-compact-row">
        <input type="number" id="${logId}" class="log-kg-input" placeholder="kg"
               min="1" step="0.5" oninput="calcolaLive('${logId}')"
               data-esercizio="${esercizio}" data-seduta="${nSeduta}"
               data-intensita="${intensitaPct || ''}" data-catena="${catena || ''}"
               data-reps="${reps || ''}" data-rm="" data-carico="">
        <span class="log-calc-result" id="rm-${logId}">—</span>
        <button class="log-save-btn" onclick="salvaLog('${logId}', this)">Salva</button>
      </div>
      <div class="log-salvato" id="ok-${logId}">✓ Salvato!</div>
    </div>`;
}

/* ---------- media helpers ---------- */
function ytId(url) {
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function isImage(url) {
  return /\.(jpe?g|png|gif|webp|svg)(\?|$)/i.test(url);
}

function mediaBlock(url, uid) {
  if (!url) return '';
  const id = 'media-' + uid;
  let content;
  const yt = ytId(url);
  if (yt) {
    content = `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${yt}?playsinline=1" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div>`;
  } else if (isImage(url)) {
    content = `<img src="${url}" alt="Istruzione" class="media-img">`;
  } else {
    content = `<a href="${url}" target="_blank" class="media-link">▶ Apri risorsa esterna</a>`;
  }
  return `
    <button class="media-toggle" onclick="toggleMedia('${id}')" aria-label="Mostra/nascondi video">
      <span class="media-toggle-icon">▶</span> Video / Istruzione
    </button>
    <div class="media-panel" id="${id}" style="display:none">${content}</div>`;
}

function toggleMedia(id) {
  const panel = document.getElementById(id);
  if (!panel) return;
  const open = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : 'block';
  const btn = panel.previousElementSibling;
  if (btn) btn.classList.toggle('media-toggle-open', !open);
  // Stop video on close
  if (open) {
    const iframe = panel.querySelector('iframe');
    if (iframe) { const s = iframe.src; iframe.src = ''; iframe.src = s; }
  }
}

function htmlStandard(e, logId) {
  let h = `<div class="esercizio">`;
  h += `<div class="eserc-nome">${e.Esercizio}</div>`;
  h += `<div class="eserc-params">`;
  if (e.Serie)        h += param('Serie', e.Serie);
  if (e.Reps)         h += param('Reps', e.Reps);
  if (e['Intensità']) h += param('Intensità', e['Intensità']);
  if (e.Recupero)     h += param('Recupero', e.Recupero);
  h += `</div>`;
  if (e.Note)               h += `<div class="eserc-note">${e.Note}</div>`;
  if (e.VideoURL)            h += mediaBlock(e.VideoURL, logId);
  if (e.Log_Libero === 'SI') h += logField(logId, e.Esercizio, e.N_Seduta, e['Intensità'], e.Catena, e.Reps);
  h += `</div>`;
  return h;
}

function htmlBicarico(e, logId) {
  let h = `<div class="esercizio" style="padding:0 0 12px;">`;
  h += `<div class="bicarico-header"><strong>${e.Esercizio}</strong>`;
  if (e.Num_Ripetizioni) h += `<span class="ripeti-badge">Ripeti ${e.Num_Ripetizioni}×</span>`;
  h += `</div>`;

  h += `<div class="carico-block a"><div class="carico-label">Carico A</div><div class="carico-params">`;
  if (e.Serie)        h += param('Serie', e.Serie);
  if (e.Reps)         h += param('Reps', e.Reps);
  if (e['Intensità']) h += param('Intensità', e['Intensità']);
  if (e.Recupero)     h += param('Recupero', e.Recupero);
  h += `</div></div>`;

  h += `<div class="bicarico-arrow">↓</div>`;

  h += `<div class="carico-block b"><div class="carico-label">Carico B</div><div class="carico-params">`;
  if (e.SerieB)          h += param('Serie', e.SerieB);
  if (e.RepsB)           h += param('Reps', e.RepsB);
  if (e['IntensitàB'])   h += param('Intensità', e['IntensitàB']);
  if (e.RecuperoB)       h += param('Recupero', e.RecuperoB);
  h += `</div></div>`;

  if (e.VideoURL)            h += `<div style="padding:0 16px;">${mediaBlock(e.VideoURL, logId + '-b')}</div>`;
  if (e.Log_Libero === 'SI') h += `<div style="padding:0 16px;margin-top:8px;">${logField(logId, e.Esercizio, e.N_Seduta, e['Intensità'], e.Catena, e.Reps)}</div>`;
  h += `</div>`;
  return h;
}

function htmlIndividuale(e) {
  const logId = `log-ind-${id}-${e.Codice}-${e.Ordine}`;
  let h = `<div class="esercizio">`;
  h += `<div class="eserc-nome">${e.Esercizio}</div>`;
  h += `<div class="eserc-params">`;
  if (e.Serie)     h += param('Serie', e.Serie);
  if (e.Reps)      h += param('Reps', e.Reps);
  if (e.Intensita) h += param('Intensità', e.Intensita);
  if (e.Recupero)  h += param('Recupero', e.Recupero);
  h += `</div>`;
  if (e.Note)               h += `<div class="eserc-note">${e.Note}</div>`;
  if (e.VideoURL)            h += mediaBlock(e.VideoURL, logId + '-v');
  if (e.Log_Libero === 'SI') h += logField(logId, e.Esercizio, 'ind', e.Intensita, e.Catena, e.Reps);
  h += `</div>`;
  return h;
}

/* ---------- caricamento ---------- */
async function caricaScheda() {
  if (!id) { window.location.href = 'index.html'; return; }

  try {
    const [resG, resL, resS, resE, resP] = await Promise.all([
      fetch(`${API}?token=${TOKEN}&azione=leggi&foglio=Giocatrici`).then(r => r.json()),
      fetch(`${API}?token=${TOKEN}&azione=leggi&foglio=LibreriaIndividuale`).then(r => r.json()),
      fetch(`${API}?token=${TOKEN}&azione=leggi&foglio=Sedute`).then(r => r.json()),
      fetch(`${API}?token=${TOKEN}&azione=leggi&foglio=Esercizi`).then(r => r.json()),
      fetch(`${API}?token=${TOKEN}&azione=leggi&foglio=Progressi`).then(r => r.json()),
    ]);

    /* costruisce mappa ultimo log e feedback per seduta */
    resP.dati
      .filter(p => String(p.ID_Giocatrice) === String(id))
      .sort((a, b) => new Date(a.Timestamp) - new Date(b.Timestamp))
      .forEach(p => {
        if (p.Esercizio === 'RPE-seduta' || p.Esercizio === 'Fatica-seduta') {
          if (!feedbackLog[p.N_Seduta]) feedbackLog[p.N_Seduta] = {};
          feedbackLog[p.N_Seduta][p.Esercizio] = Number(p.Valore);
        } else if (p.Valore) {
          ultimiLog[p.Esercizio] = {
            valore: p.Valore,
            rm: p.RM_Stimato ? Math.round(Number(p.RM_Stimato)) : null,
          };
        }
      });

    const g = resG.dati.find(x => String(x.ID) === String(id));
    if (!g) { mostraErrore('Giocatrice non trovata.'); return; }

    /* HERO */
    document.getElementById('hero-numero').textContent = '#' + g.Numero;
    document.getElementById('hero-nome').textContent   = g.Nome;
    document.getElementById('hero-ruolo').textContent  = g.Ruolo || '';
    document.title = g.Nome + ' — Scheda';

    /* INDIVIDUALE */
    const codici = (g.Colonne_Individuali || '').split(',').map(c => c.trim()).filter(Boolean);
    const libMap  = {};
    resL.dati.forEach(e => {
      if (!libMap[e.Codice]) libMap[e.Codice] = { titolo: e.Titolo_Colonna, esercizi: [] };
      libMap[e.Codice].esercizi.push(e);
    });

    const divInd = document.getElementById('individuale');
    divInd.innerHTML = '';
    codici.forEach(cod => {
      const col = libMap[cod];
      if (!col) return;
      col.esercizi.sort((a, b) => Number(a.Ordine) - Number(b.Ordine));
      let html = `<div class="modulo-card"><div class="modulo-header">${cod} — ${col.titolo}</div>`;
      col.esercizi.forEach(e => { html += htmlIndividuale(e); });
      html += `</div>`;
      divInd.innerHTML += html;
    });

    /* SEDUTE */
    const seduteGioc = resS.dati
      .filter(s => String(s.ID_Giocatrice) === String(id))
      .sort((a, b) => Number(a.Numero_Seduta) - Number(b.Numero_Seduta));

    const eserciziGioc = resE.dati.filter(e => String(e.ID_Giocatrice) === String(id));

    const divSed = document.getElementById('sedute');
    divSed.innerHTML = '';

    seduteGioc.forEach(sed => {
      const esercSed = eserciziGioc
        .filter(e => String(e.N_Seduta) === String(sed.Numero_Seduta))
        .sort((a, b) => (Number(a.Ord_Metodo) - Number(b.Ord_Metodo)) || (Number(a.Ord_Eserc) - Number(b.Ord_Eserc)));

      /* raggruppa per metodo mantenendo l'ordine di prima comparsa */
      const metodiOrd = [];
      const metodiMap = {};
      esercSed.forEach(e => {
        if (!metodiMap[e.Metodo]) {
          metodiMap[e.Metodo] = { nome: e.Metodo, desc: e.Desc_Metodo, esercizi: [] };
          metodiOrd.push(e.Metodo);
        }
        metodiMap[e.Metodo].esercizi.push(e);
      });

      const accId = `acc-${sed.Numero_Seduta}`;
      let html = `
        <div class="seduta-accordion" id="${accId}">
          <button class="seduta-header" onclick="toggleSeduta('${accId}')">
            <h3>${sed.Nome_Seduta}</h3>
            <span class="chevron">▾</span>
          </button>
          <div class="seduta-body">`;

      metodiOrd.forEach(key => {
        const m = metodiMap[key];
        html += `<div class="metodo-block">`;
        html += `<div class="metodo-titolo">${m.nome}</div>`;
        if (m.desc) html += `<div class="metodo-desc">${m.desc}</div>`;
        m.esercizi.forEach(e => {
          const logId = `log-${id}-${e.N_Seduta}-${e.Ord_Metodo}-${e.Ord_Eserc}`;
          html += e.Tipo_Esercizio === 'bicarico' ? htmlBicarico(e, logId) : htmlStandard(e, logId);
        });
        html += `</div>`;
      });

      html += htmlFeedbackSeduta(sed.Numero_Seduta, feedbackLog[sed.Numero_Seduta] || {});
      html += `</div></div>`;
      divSed.innerHTML += html;
    });

    /* PROFILO */
    document.getElementById('profilo').innerHTML = buildProfilo(resE, resP);

    /* mostra contenuto */
    document.getElementById('loading').style.display  = 'none';
    document.getElementById('contenuto').style.display = '';

  } catch (err) {
    mostraErrore('Errore nel caricamento. Riprova.');
  }
}

function mostraErrore(msg) {
  document.getElementById('loading').innerHTML = `<p class="errore-msg">${msg}</p>`;
}

/* ---------- interazioni ---------- */
function mostraSezione(id, btn) {
  document.querySelectorAll('.sezione').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function toggleSeduta(id) {
  document.getElementById(id).classList.toggle('open');
}

function calcolaLive(logId) {
  const input = document.getElementById(logId);
  if (!input) return;
  const kg   = parseFloat(input.value);
  const reps = parseInt(input.dataset.reps) || 0;
  const rmEl = document.getElementById('rm-' + logId);

  if (!(kg > 0 && reps > 0)) {
    if (rmEl) rmEl.innerHTML = '—';
    input.dataset.rm = ''; input.dataset.carico = '';
    return;
  }

  const catena       = input.dataset.catena;
  const intensitaPct = parseFloat(input.dataset.intensita) || 0;
  const bw           = parseFloat(document.getElementById('peso-input')?.value) || 0;

  const rm = catena === 'lower' && bw > 0
    ? Math.round((kg + bw) * (1 + reps / 30))
    : Math.round(kg * (1 + reps / 30));

  input.dataset.rm = rm;

  let html = `RM <em>~${rm} kg</em>`;
  if (intensitaPct > 0) {
    const carico = catena === 'lower' && bw > 0
      ? Math.round((rm * intensitaPct - bw) * 2) / 2
      : Math.round(rm * intensitaPct * 2) / 2;
    if (carico > 0) {
      input.dataset.carico = carico;
      html += ` · <em>${carico} kg</em>`;
    }
  }
  if (rmEl) rmEl.innerHTML = html;
}

async function salvaLog(inputId, btn) {
  const input = document.getElementById(inputId);
  const kg    = parseFloat(input.value);
  const rm    = parseInt(input.dataset.rm) || null;

  if (!kg || !rm) {
    input.style.outline = '2px solid #c33';
    setTimeout(() => input.style.outline = '', 1500);
    return;
  }

  const carico    = parseFloat(input.dataset.carico) || null;
  const reps      = parseInt(input.dataset.reps) || null;
  const esercizio = input.dataset.esercizio;
  const nSeduta   = input.dataset.seduta;
  const valore    = carico != null ? `${carico} kg` : `RM ${rm} kg`;

  btn.textContent = '...';
  btn.disabled    = true;

  try {
    await fetch(API, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        token: TOKEN, azione: 'log_progressi',
        id_giocatrice: id, n_seduta: nSeduta, esercizio: esercizio,
        data: new Date().toLocaleDateString('it-IT'),
        valore, note: '',
        kg_usati: kg, reps_fatte: reps || '', rm_stimato: rm,
      }),
    });

    ultimiLog[esercizio] = { valore, rm };
    const row     = input.closest('.log-compact');
    const ultimaEl = row?.querySelector('.ultima-seduta');
    if (ultimaEl) {
      ultimaEl.innerHTML = `Ultima: <em>${valore}</em> · RM ~${rm} kg`;
    } else if (row) {
      const div = document.createElement('div');
      div.className = 'ultima-seduta';
      div.innerHTML = `Ultima: <em>${valore}</em> · RM ~${rm} kg`;
      row.prepend(div);
    }

    btn.textContent = '✓';
    btn.style.background = 'var(--verde)';
    const okEl = document.getElementById('ok-' + inputId);
    if (okEl) okEl.style.display = 'block';
  } catch {
    btn.textContent = 'Errore';
  } finally {
    setTimeout(() => { btn.textContent = 'Salva'; btn.style.background = ''; btn.disabled = false; }, 2000);
  }
}

function buildProfilo(resE, resP) {
  /* peso corporeo — ultima voce salvata */
  const pesoLogs = resP.dati
    .filter(p => String(p.ID_Giocatrice) === String(id) && p.Esercizio === 'Peso-corporeo')
    .sort((a, b) => new Date(a.Timestamp) - new Date(b.Timestamp));
  const ultimoPeso = pesoLogs.length ? pesoLogs[pesoLogs.length - 1].Valore : '';

  /* log esercizi, raggruppati per nome */
  const logPerEserc = {};
  resP.dati
    .filter(p => String(p.ID_Giocatrice) === String(id) && p.Valore &&
                 p.Esercizio !== 'Peso-corporeo' &&
                 p.Esercizio !== 'RPE-seduta' &&
                 p.Esercizio !== 'Fatica-seduta')
    .sort((a, b) => new Date(a.Timestamp) - new Date(b.Timestamp))
    .forEach(p => {
      if (!logPerEserc[p.Esercizio]) logPerEserc[p.Esercizio] = [];
      logPerEserc[p.Esercizio].push(p);
    });

  /* ordine esercizi come da scheda */
  const ordine = [];
  const seen = new Set();
  resE.dati
    .filter(e => String(e.ID_Giocatrice) === String(id))
    .sort((a, b) =>
      (Number(a.N_Seduta)   - Number(b.N_Seduta))   ||
      (Number(a.Ord_Metodo) - Number(b.Ord_Metodo)) ||
      (Number(a.Ord_Eserc)  - Number(b.Ord_Eserc)))
    .forEach(e => {
      if (!seen.has(e.Esercizio) && logPerEserc[e.Esercizio]) {
        seen.add(e.Esercizio);
        ordine.push(e.Esercizio);
      }
    });

  let html = `
    <div class="profilo-card">
      <div class="profilo-header">Peso corporeo</div>
      <div class="peso-input-row">
        <input type="number" id="peso-input" placeholder="es. 65" min="30" max="150" step="0.5" value="${ultimoPeso}">
        <span class="peso-unit">kg</span>
        <button onclick="salvaPeso(this)">Salva</button>
      </div>
      <div class="log-salvato" id="ok-peso" style="padding:0 16px 10px">✓ Salvato!</div>
    </div>`;

  if (ordine.length === 0) {
    html += `<p class="loading-msg" style="padding:20px 0">Nessun carico registrato ancora.</p>`;
    return html;
  }

  html += `<div class="profilo-card"><div class="profilo-header">Storico carichi</div>`;
  ordine.forEach(nome => {
    const chips = logPerEserc[nome].map(p => {
      const nota = p.Note ? `<em>${p.Note}</em>` : '';
      return `<span class="storico-chip">${formatData(p.Data)}<br><strong>${p.Valore}</strong>${nota ? `<br>${nota}` : ''}</span>`;
    }).join('');
    html += `
      <div class="storico-eserc">
        <div class="storico-nome">${nome}</div>
        <div class="storico-chips">${chips}</div>
      </div>`;
  });
  html += `</div>`;
  return html;
}

async function salvaPeso(btn) {
  const input = document.getElementById('peso-input');
  const val   = parseFloat(input.value);
  if (!val || val < 30 || val > 150) return;
  btn.textContent = '...';
  btn.disabled    = true;
  try {
    await fetch(API, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        token: TOKEN, azione: 'log_progressi',
        id_giocatrice: id, n_seduta: '0', esercizio: 'Peso-corporeo',
        data: new Date().toLocaleDateString('it-IT'),
        valore: String(val), note: '',
        kg_usati: '', reps_fatte: '', rm_stimato: '',
      }),
    });
    const okEl = document.getElementById('ok-peso');
    if (okEl) { okEl.style.display = 'block'; setTimeout(() => okEl.style.display = 'none', 1500); }
  } catch {}
  setTimeout(() => { btn.textContent = 'Salva'; btn.disabled = false; }, 2000);
}

function htmlFeedbackSeduta(nSeduta, prev) {
  const rpeId = `rpe-${id}-${nSeduta}`;
  const fatId = `fat-${id}-${nSeduta}`;
  const prevRpe = prev['RPE-seduta'] || null;
  const prevFat = prev['Fatica-seduta'] || null;

  let rpeBtn = '', fatBtn = '';
  for (let i = 1; i <= 10; i++) {
    const sel = i === prevRpe ? ' selected' : '';
    rpeBtn += `<button class="rating-btn${sel}" onclick="salvaRating(this,'${rpeId}',${i},'RPE-seduta','${nSeduta}')">${i}</button>`;
  }
  for (let i = 1; i <= 5; i++) {
    const sel = i === prevFat ? ' selected' : '';
    fatBtn += `<button class="rating-btn${sel}" onclick="salvaRating(this,'${fatId}',${i},'Fatica-seduta','${nSeduta}')">${i}</button>`;
  }

  return `
    <div class="feedback-seduta">
      <div class="feedback-row">
        <span class="feedback-label">Intensità seduta <span class="feedback-hint">1 facile · 10 al limite</span></span>
        <div class="rating-group" id="${rpeId}">${rpeBtn}</div>
      </div>
      <div class="feedback-row">
        <span class="feedback-label">Come ti senti <span class="feedback-hint">1 esausta · 5 perfetta</span></span>
        <div class="rating-group" id="${fatId}">${fatBtn}</div>
      </div>
      <div class="feedback-salvato" id="ok-fb-${nSeduta}">✓ Salvato!</div>
    </div>`;
}

async function salvaRating(btn, groupId, val, esercizio, nSeduta) {
  const group = document.getElementById(groupId);
  group.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  if (!feedbackLog[nSeduta]) feedbackLog[nSeduta] = {};
  feedbackLog[nSeduta][esercizio] = val;

  try {
    await fetch(API, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        token: TOKEN, azione: 'log_progressi',
        id_giocatrice: id, n_seduta: nSeduta, esercizio: esercizio,
        data: new Date().toLocaleDateString('it-IT'),
        valore: String(val), note: '',
        kg_usati: '', reps_fatte: '', rm_stimato: '',
      }),
    });
    const okEl = document.getElementById(`ok-fb-${nSeduta}`);
    if (okEl) { okEl.style.display = 'block'; setTimeout(() => okEl.style.display = 'none', 1500); }
  } catch {}
}

caricaScheda();
</script>
