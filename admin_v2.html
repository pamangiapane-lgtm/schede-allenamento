s/2019/07/posttypevimeo-videop15571-vimeo-thumbnail.jpg"}],"yt":"https://www.youtube.com/results?search_query=prehab+guys+mobility+anche+in+rotazione+interna+90+90+bilaterale"},{"it":"Stretching del quadricipite prono con elastico","c":"green","sc":0.223,"b":{"n":"90/90 Hip Stretch","t":"https://library.theprehabguys.com/wp-content/uploads/2019/09/posttypevimeo-videop16454-vimeo-thumbnail.jpg","h":"Preparati in una posizione 90/90, puoi utilizzare un blocco yoga o qualcos'altro sotto l'anca anteriore per assumere la posizione corretta (segui il video per suggerimenti e dettagli). Una volta impostato, mantieni le cosce, le ginocchia e i piedi appoggiati al suolo, solleva il petto per allungare ","f":"un allungamento e mantieni la posizione. SENSAZIONE: dovresti sentire un allungamento nella parte posteriore dell'anca e nel sedere sulla coscia anteriore. Potresti sentire un allungamento all'interno","a":"Guarda il video per suggerimenti e dettagli, la cosa più importante è avere un busto lungo e una schiena relativamente dritta nel miglior modo possibile, soprattutto quando sposti il ​​peso in avanti."},"alt":[{"n":"Bretzel Stretch","t":"https://library.theprehabguys.com/wp-content/uploads/2020/09/bretzel-stretch-vimeo-thumbnail.jpg"},{"n":"Butterfly Stretch","t":"https://library.theprehabguys.com/wp-content/uploads/2019/09/posttypevimeo-videop16470-vimeo-thumbnail.jpg"}],"yt":"https://www.youtube.com/results?search_query=prehab+guys+stretch+del+quadricipite+prono+con+elastico"},{"it":"Mobilità Anche in Rotazione Esterna (Prono) & Estensione Toracica","c":"green","sc":0.191,"b":{"n":"Neck Mobility Assessment","t":"https://library.theprehabguys.com/wp-content/uploads/2019/12/Neck-Mobility-Assessment-01.png","h":"la colonna cervicale, o collo, si muove su tutti i piani di movimento. Eseguirai la flessione e l'estensione del collo, la piegatura laterale in entrambe le direzioni, la rotazione in entrambe le direzioni e la flessione + rotazione. Sarebbe nel tuo interesse filmarlo direttamente frontalmente e di ","f":"","a":""},"alt":[{"n":"Adductor Mobility Flow In Quadruped","t":"https://library.theprehabguys.com/wp-content/uploads/2019/06/posttypevimeo-videop14433-vimeo-thumbnail.jpg"},{"n":"Dynamic Hip Mobility Drill","t":"https://library.theprehabguys.com/wp-content/uploads/2019/07/posttypevimeo-videop15571-vimeo-thumbnail.jpg"}],"yt":"https://www.youtube.com/results?search_query=prehab+guys+mobility+anche+in+rotazione+esterna+prono+estensione+toracica"}];

let libData=null, approvals={}, curIdx=null, selEntry=null, filteredLib=[];
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function init(){
  const greens=MATCHES.filter(m=>m.c==='green');
  const yellows=MATCHES.filter(m=>m.c!=='green');
  $('cnt-g').textContent=greens.length;
  $('cnt-y').textContent=yellows.length;
  $('badge-g').textContent=greens.length;
  $('badge-y').textContent=yellows.length;
  greens.forEach(m=>{approvals[m.it]=m.b;});
  renderYellows(yellows);
  renderGreens(greens);
  updateSave();
  $('status').textContent=greens.length+' auto-approvati · '+yellows.length+' da verificare manualmente';
}

function renderYellows(yellows){
  $('section-yellow').innerHTML=yellows.map((m,i)=>{
    const d=m.b
      ? '<div class="desc">'+(m.b.h?'<strong>Come:</strong> '+esc(m.b.h.slice(0,200))+'<br>':'')+(m.b.f?'<strong>Sensazione:</strong> '+esc(m.b.f.slice(0,150)):'')+'</div>'
      : '<div class="desc" style="color:#f85149">Nessun match — usa "Cerca alternativa"</div>';
    return '<div class="card-y" id="cy-'+i+'">'
      +'<div class="card-y-it">'+esc(m.it)+'</div>'
      +'<div class="card-y-en" id="yen-'+i+'">'+(m.b?esc(m.b.n):'—')+'</div>'
      +'<div class="card-y-body">'
      +(m.b&&m.b.t?'<img class="thumb-l" id="yth-'+i+'" src="'+esc(m.b.t)+'" onerror="this.style.opacity=0">':'<div class="thumb-l" id="yth-'+i+'"></div>')
      +d
      +'</div>'
      +'<div class="card-y-actions">'
      +(m.yt?'<a href="'+esc(m.yt)+'" target="_blank" class="btn btn-gray" style="font-size:11px;text-decoration:none">▶ YouTube</a>':'')
      +'<button class="btn btn-blue" style="font-size:12px" onclick="apriRicerca('+i+')">🔍 Cerca alternativa</button>'
      +'<button class="btn btn-green" style="font-size:12px" id="yn-'+i+'" onclick="approvaGiallo('+i+')">✓ Questo va bene</button>'
      +'<span class="ok-lbl" id="yst-'+i+'">✓ Approvato</span>'
      +'</div></div>';
  }).join('');
}

function renderGreens(greens){
  $('section-green').innerHTML='<div class="grid-green">'+greens.map((m,i)=>
    '<div class="card-g">'
    +(m.b&&m.b.t?'<img class="thumb-s" src="'+esc(m.b.t)+'" onerror="this.style.opacity=0">':'<div class="thumb-s"></div>')
    +'<div class="card-g-body"><div class="card-g-it">'+esc(m.it)+'</div><div class="card-g-en">'+esc(m.b?m.b.n:'—')+'</div></div>'
    +'<span class="chk">✓</span></div>'
  ).join('')+'</div>';
}

function toggleGreen(){const s=$('section-green');s.style.display=s.style.display==='none'?'block':'none';}

function approvaVerdi(){
  MATCHES.filter(m=>m.c==='green').forEach(m=>{approvals[m.it]=m.b;});
  updateSave();
  $('status').textContent='Tutti i verdi approvati — conferma i gialli e poi salva';
}

function approvaGiallo(i){
  const m=MATCHES.filter(x=>x.c!=='green')[i];
  if(m&&m.b){approvals[m.it]=m.b;}
  $('yn-'+i).style.display='none';
  $('yst-'+i).style.display='inline';
  updateSave();
}

function updateSave(){
  const n=Object.keys(approvals).length;
  $('btn-save').disabled=n===0;
  $('btn-save').textContent=n>0?'Salva '+n+' su Sheets':'Salva su Sheets';
}

function apriRicerca(i){
  const yellows=MATCHES.filter(m=>m.c!=='green');
  curIdx=i; selEntry=null;
  const m=yellows[i];
  $('modal-title').textContent=m.it;
  $('btn-ok').disabled=true;
  $('modal-prev').classList.remove('show');
  $('q').value=m.it.replace(/[()+&]/g,' ').trim().split(/\s+/).slice(0,4).join(' ');
  $('modal-bg').classList.add('open');
  if(libData) cerca($('q').value);
  else{$('results').innerHTML='<div class="r-empty">Carico libreria...</div>';caricaLib();}
  setTimeout(()=>$('q').focus(),60);
}

function chiudiModal(){$('modal-bg').classList.remove('open');curIdx=null;selEntry=null;}
function bgClick(e){if(e.target===$('modal-bg'))chiudiModal();}

async function caricaLib(){
  try{const r=await fetch('./lib_prehab.json');libData=await r.json();cerca($('q').value);}
  catch(e){$('results').innerHTML='<div class="r-empty" style="color:#f85149">Errore caricamento: '+e.message+'</div>';}
}

function cerca(q){
  if(!libData)return;
  const terms=q.toLowerCase().trim().split(/\s+/).filter(Boolean);
  filteredLib=terms.length?libData.filter(e=>terms.every(t=>e.n.toLowerCase().includes(t))).slice(0,60):libData.slice(0,40);
  $('results').innerHTML=filteredLib.length
    ?filteredLib.map((e,i)=>'<div class="r-item'+(selEntry&&selEntry.n===e.n?' sel':'')+'" onclick="selIdx('+i+')">'
        +'<img class="r-thumb" src="'+esc(e.t)+'" onerror="this.style.opacity=0">'
        +'<div class="r-name">'+esc(e.n)+'</div></div>').join('')
    :'<div class="r-empty">Nessun risultato</div>';
}

function selIdx(i){
  selEntry=filteredLib[i];
  $('btn-ok').disabled=false;
  $('prev-img').src=selEntry.t;$('prev-img').style.opacity=1;
  $('prev-name').textContent=selEntry.n;
  const p=[];
  if(selEntry.h)p.push('Come: '+selEntry.h.slice(0,200));
  if(selEntry.f)p.push('Sensazione: '+selEntry.f.slice(0,150));
  $('prev-text').textContent=p.join(' · ');
  $('modal-prev').classList.add('show');
  const items=$('results').querySelectorAll('.r-item');
  items.forEach((el,j)=>el.classList.toggle('sel',j===i));
}

function confermaModal(){
  if(!selEntry||curIdx===null)return;
  const yellows=MATCHES.filter(m=>m.c!=='green');
  const m=yellows[curIdx];
  approvals[m.it]={n:selEntry.n,t:selEntry.t,h:selEntry.h||'',f:selEntry.f||'',a:selEntry.a||''};
  const yth=$('yth-'+curIdx);
  if(yth){yth.src=selEntry.t;yth.style.opacity=1;}
  $('yen-'+curIdx).textContent=selEntry.n;
  $('yn-'+curIdx).style.display='none';
  $('yst-'+curIdx).style.display='inline';
  chiudiModal();
  updateSave();
}

async function salva(){
  const btn=$('btn-save');
  btn.disabled=true;
  $('status').textContent='Caricamento dati dal foglio...';
  $('bar').style.width='10%';
  try{
    const r1=await fetch(API+'?token='+TOKEN+'&azione=leggi&foglio=LibreriaIndividuale');
    const d1=await r1.json();
    const rows=d1.dati||[];
    let headers=rows.length?Object.keys(rows[0]):[];
    if(!headers.includes('Istruzione'))headers=[...headers,'Istruzione'];
    $('bar').style.width='40%';
    $('status').textContent='Aggiornamento '+Object.keys(approvals).length+' esercizi...';
    let updated=0;
    const newRows=rows.map(row=>{
      const nome=(row.Esercizio||'').trim();
      const match=approvals[nome];
      const r={...row};
      if(match){
        r.VideoURL=match.t||row.VideoURL||'';
        r.Istruzione=JSON.stringify({n:match.n,h:match.h||'',f:match.f||'',a:match.a||''});
        updated++;
      }
      return headers.map(h=>r[h]!==undefined?r[h]:'');
    });
    $('bar').style.width='70%';
    const r2=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({token:TOKEN,azione:'svuota_e_riscrivi',foglio:'LibreriaIndividuale',intestazioni:headers,righe:newRows})});
    const d2=await r2.json();
    $('bar').style.width='100%';
    if(d2.ok){
      $('status').textContent='Salvato! '+updated+' esercizi aggiornati con thumbnail e descrizioni Prehab Guys.';
    } else {
      $('status').textContent='Errore: '+(d2.errore||'risposta inattesa');
    }
  }catch(e){
    $('status').textContent='Errore: '+e.message;
  }finally{
    btn.disabled=false;
  }
}

init();
</script>
</body>
</html>
