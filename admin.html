<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prehab Matcher — Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
    .top{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;gap:12px}
    .top h1{font-size:16px;color:#58a6ff;font-weight:600;flex-shrink:0}
    .top-status{font-size:12px;color:#8b949e;margin-left:auto;text-align:right}
    .btn{padding:6px 14px;border-radius:6px;border:1px solid #30363d;cursor:pointer;font-size:13px}
    .btn-green{background:#238636;border-color:#2ea043;color:#fff}
    .btn-green:hover{background:#2ea043}
    .btn-green:disabled{background:#21262d;color:#8b949e;cursor:default}
    .btn-gray{background:#21262d;color:#c9d1d9}
    .btn-gray:hover{background:#30363d}
    .btn-red{background:none;border:none;color:#f85149;cursor:pointer;font-size:12px;padding:4px 8px}

    .container{padding:20px;max-width:1200px;margin:0 auto}
    .header-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .header-row h2{font-size:13px;color:#8b949e}
    .match-count{margin-left:auto;font-size:13px;color:#2ea043;font-weight:600}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
    .card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;transition:border-color .15s}
    .card.matched{border-color:#238636}
    .card-nome{font-weight:600;font-size:13px;margin-bottom:8px;line-height:1.3}
    .card-img-wrap{height:120px;border-radius:6px;overflow:hidden;background:#21262d;display:flex;align-items:center;justify-content:center}
    .card-img{width:100%;height:100%;object-fit:cover}
    .card-placeholder{color:#484f58;font-size:28px}
    .card-match{font-size:11px;color:#8b949e;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-actions{margin-top:8px;display:flex;align-items:center;gap:6px}

    /* Modal */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-start;justify-content:center;padding-top:5vh}
    .modal-bg.open{display:flex}
    .modal{background:#161b22;border:1px solid #30363d;border-radius:10px;width:min(94vw,720px);max-height:88vh;display:flex;flex-direction:column}
    .modal-head{padding:14px 16px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .modal-head h2{font-size:14px}
    .modal-x{background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer;line-height:1}
    .modal-search{padding:10px 16px;flex-shrink:0}
    .modal-search input{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:14px}
    .modal-search input:focus{outline:none;border-color:#58a6ff}
    .modal-preview{display:none;margin:0 16px 8px;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px;gap:10px;flex-shrink:0}
    .modal-preview.show{display:flex}
    .modal-preview img{width:100px;height:75px;object-fit:cover;border-radius:5px;flex-shrink:0}
    .prev-body{overflow:hidden}
    .prev-name{font-weight:600;font-size:13px;margin-bottom:4px;color:#58a6ff}
    .prev-text{font-size:11px;color:#8b949e;line-height:1.5;max-height:80px;overflow:hidden}
    .results{flex:1;overflow-y:auto;padding:0 16px 10px}
    .r-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent}
    .r-item:hover{background:#21262d}
    .r-item.sel{border-color:#2ea043;background:#0d2a1e}
    .r-thumb{width:56px;height:42px;object-fit:cover;border-radius:4px;flex-shrink:0;background:#21262d}
    .r-name{font-size:12px;line-height:1.4}
    .r-empty{padding:20px;text-align:center;color:#484f58;font-size:13px}
    .modal-foot{padding:10px 16px;border-top:1px solid #30363d;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

    .loading-msg{color:#8b949e;padding:40px 0;font-size:14px}
  </style>
</head>
<body>

<div class="top">
  <h1>⚙️ Prehab Matcher</h1>
  <button class="btn btn-green" id="btn-salva" onclick="salva()" style="display:none">💾 Salva tutto</button>
  <div class="top-status" id="top-status"></div>
</div>

<div class="container">
  <div class="loading-msg" id="msg-loading">Caricamento dati...</div>
  <div id="main" style="display:none">
    <div class="header-row">
      <h2>Abbina ogni esercizio prehab all'immagine e descrizione corretta della libreria Prehab Guys</h2>
      <div class="match-count" id="match-count"></div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- Search Modal -->
<div class="modal-bg" id="modal-bg" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Cerca esercizio</h2>
      <button class="modal-x" onclick="chiudiModal()">✕</button>
    </div>
    <div class="modal-search">
      <input type="text" id="q" placeholder="Cerca per nome (es. hip abduction, shoulder…)" oninput="cerca(this.value)">
    </div>
    <div class="modal-preview" id="preview">
      <img id="prev-img" src="" alt="" onerror="this.style.opacity=0">
      <div class="prev-body">
        <div class="prev-name" id="prev-name"></div>
        <div class="prev-text" id="prev-text"></div>
      </div>
    </div>
    <div class="results" id="results"></div>
    <div class="modal-foot">
      <button class="btn btn-gray" onclick="chiudiModal()">Annulla</button>
      <button class="btn btn-green" id="btn-ok" onclick="conferma()" disabled>Conferma</button>
    </div>
  </div>
</div>

<script>
const API   = 'https://script.google.com/macros/s/AKfycbyxLzbnm_LcBDYrB1_hBdCD6HxvOxA7__lXHe7_xmbe2kynoGNA_oDDh954zR3RIzr9/exec';
const TOKEN = 'squadra2026';

let libData      = [];   // lib_prehab.json entries [{n,t,h,f,a}]
let libiRows     = [];   // LibreriaIndividuale rows (objects)
let libiHeaders  = [];   // ordered header list for save
let matches      = {};   // { exerciseName: lib_prehab entry }
let currentNome  = null; // exercise being edited in modal
let selEntry     = null; // entry selected in modal (not yet confirmed)
let filteredLib  = [];   // current search results

const $ = id => document.getElementById(id);

/* ── API helpers ── */
async function apiGet(foglio) {
  const r = await fetch(`${API}?token=${TOKEN}&azione=leggi&foglio=${encodeURIComponent(foglio)}`);
  return r.json();
}
async function apiPost(payload) {
  const r = await fetch(API, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  return r.json();
}

/* ── Init ── */
async function init() {
  setMsg('Caricamento dati...');
  try {
    const [resLibi, libJson] = await Promise.all([
      apiGet('LibreriaIndividuale'),
      fetch('./lib_prehab.json').then(r => r.json())
    ]);
    libiRows = resLibi.dati || [];
    libData  = libJson;

    if (libiRows.length > 0) {
      libiHeaders = Object.keys(libiRows[0]);
    }

    // Pre-fill matches from existing Istruzione JSON
    const seen = new Set();
    libiRows.forEach(row => {
      const nome = (row.Esercizio || '').trim();
      if (!nome || seen.has(nome)) return;
      seen.add(nome);
      if (row.Istruzione) {
        try { matches[nome] = JSON.parse(row.Istruzione); } catch {}
      }
    });

    $('msg-loading').style.display = 'none';
    $('main').style.display = 'block';
    $('btn-salva').style.display = '';
    renderGrid();
    setMsg(`${libiRows.length} righe · ${uniqueNames().length} esercizi · ${libData.length} in libreria`);
  } catch (err) {
    setMsg('Errore: ' + err.message);
  }
}

function uniqueNames() {
  const seen = new Set(), out = [];
  libiRows.forEach(r => {
    const n = (r.Esercizio || '').trim();
    if (n && !seen.has(n)) { seen.add(n); out.push(n); }
  });
  return out;
}

/* ── Grid ── */
function renderGrid() {
  const nomi = uniqueNames();
  $('grid').innerHTML = nomi.map(nome => cardHtml(nome)).join('');
  $('match-count').textContent = `${Object.keys(matches).length}/${nomi.length} abbinati`;
}

function cardHtml(nome) {
  const row   = libiRows.find(r => r.Esercizio === nome);
  const match = matches[nome];
  const thumb = (match && match.t) || (row && row.VideoURL) || '';
  const isMatched = !!match;
  const cid = encId(nome);

  const imgHtml = thumb
    ? `<img class="card-img" src="${esc(thumb)}" onerror="this.parentNode.innerHTML='<span class=card-placeholder>📷</span>'" alt="">`
    : `<span class="card-placeholder">📷</span>`;

  return `<div class="card${isMatched ? ' matched' : ''}" id="card-${cid}">
    <div class="card-nome">${esc(nome)}</div>
    <div class="card-img-wrap" id="img-${cid}">${imgHtml}</div>
    <div class="card-match" id="lbl-${cid}">${isMatched ? '✓ ' + esc(match.n) : '— nessuna corrispondenza'}</div>
    <div class="card-actions">
      <button class="btn btn-gray" style="font-size:12px" onclick="apriRicerca(${JSON.stringify(nome)})">${isMatched ? '✏️ Cambia' : '🔍 Abbina'}</button>
      ${isMatched ? `<button class="btn-red" onclick="rimuovi(${JSON.stringify(nome)})">✕ Rimuovi</button>` : ''}
    </div>
  </div>`;
}

function encId(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ── Modal ── */
function apriRicerca(nome) {
  currentNome = nome;
  selEntry = null;
  $('modal-title').textContent = nome;
  $('btn-ok').disabled = true;
  $('preview').classList.remove('show');
  // Seed search with first keywords
  const seed = nome.split(/[\s\-\/]+/).slice(0, 3).join(' ');
  $('q').value = seed;
  $('modal-bg').classList.add('open');
  cerca(seed);
  setTimeout(() => $('q').focus(), 60);
}

function chiudiModal() {
  $('modal-bg').classList.remove('open');
  currentNome = null;
  selEntry = null;
}

function bgClick(ev) {
  if (ev.target === $('modal-bg')) chiudiModal();
}

function cerca(q) {
  const terms = q.toLowerCase().trim().split(/\s+/).filter(Boolean);
  filteredLib = terms.length
    ? libData.filter(e => terms.every(t => e.n.toLowerCase().includes(t))).slice(0, 60)
    : libData.slice(0, 40);
  renderResults();
}

function renderResults() {
  if (!filteredLib.length) {
    $('results').innerHTML = '<div class="r-empty">Nessun risultato</div>';
    return;
  }
  $('results').innerHTML = filteredLib.map((e, i) => `
    <div class="r-item${selEntry && selEntry.n === e.n ? ' sel' : ''}" onclick="selIdx(${i})">
      <img class="r-thumb" src="${esc(e.t)}" alt="" onerror="this.style.opacity=0">
      <div class="r-name">${esc(e.n)}</div>
    </div>`).join('');
}

function selIdx(i) {
  selEntry = filteredLib[i];
  $('btn-ok').disabled = false;
  // Preview
  $('prev-img').src = selEntry.t;
  $('prev-img').style.opacity = 1;
  $('prev-name').textContent = selEntry.n;
  const parts = [];
  if (selEntry.h) parts.push('Come: ' + selEntry.h.slice(0, 250) + (selEntry.h.length > 250 ? '…' : ''));
  if (selEntry.f) parts.push('Sensazione: ' + selEntry.f);
  if (selEntry.a) parts.push('Evitare: ' + selEntry.a);
  $('prev-text').textContent = parts.join(' · ');
  $('preview').classList.add('show');
  renderResults();
}

function conferma() {
  if (!selEntry || !currentNome) return;
  matches[currentNome] = selEntry;
  chiudiModal();
  renderGrid();
}

function rimuovi(nome) {
  delete matches[nome];
  renderGrid();
}

/* ── Save ── */
async function salva() {
  const btn = $('btn-salva');
  btn.disabled = true;
  btn.textContent = '⏳ Salvataggio...';
  setMsg('Preparazione dati...');
  try {
    // Add Istruzione header if missing
    if (!libiHeaders.includes('Istruzione')) {
      libiHeaders = [...libiHeaders, 'Istruzione'];
    }

    const righe = libiRows.map(row => {
      const nome  = (row.Esercizio || '').trim();
      const match = matches[nome];
      const r     = {...row};
      if (match) {
        r.VideoURL   = match.t || row.VideoURL;
        r.Istruzione = JSON.stringify({n: match.n, h: match.h || '', f: match.f || '', a: match.a || ''});
      }
      return libiHeaders.map(h => (r[h] !== undefined ? r[h] : ''));
    });

    setMsg('Scrittura sul foglio...');
    const res = await apiPost({
      token: TOKEN,
      azione: 'svuota_e_riscrivi',
      foglio: 'LibreriaIndividuale',
      intestazioni: libiHeaders,
      righe
    });

    if (res.ok) {
      setMsg(`✓ Salvato! ${Object.keys(matches).length} esercizi abbinati.`);
    } else {
      setMsg('Errore: ' + (res.errore || 'risposta inattesa'));
    }
  } catch (err) {
    setMsg('Errore: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Salva tutto';
  }
}

function setMsg(msg) {
  $('top-status').textContent = msg;
}

init();
</script>
</body>
</html>
