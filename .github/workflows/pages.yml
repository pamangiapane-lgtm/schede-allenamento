name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-build

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-build

      - name: Prepara cartella pubblicazione
        run: |
          cp -r main-build site
          rm -rf site/.github site/backup_locale site/apps_script_prod_project site/apps_script_dev_project site/_strumenti
          mkdir -p site/dev
          cp dev-build/index.html    site/dev/index.html
          cp dev-build/scheda.html   site/dev/scheda.html
          cp dev-build/style.css     site/dev/style.css
          cp dev-build/sw.js         site/dev/sw.js
          cp dev-build/manifest.json site/dev/manifest.json
          cp dev-build/offline.html  site/dev/offline.html  2>/dev/null || true
          cp dev-build/icon.svg      site/dev/icon.svg      2>/dev/null || true
          cp dev-build/report.html   site/dev/report.html   2>/dev/null || true
          cp dev-build/coach.html    site/dev/coach.html    2>/dev/null || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
