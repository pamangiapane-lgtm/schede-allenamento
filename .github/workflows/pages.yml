name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main (produzione)
        uses: actions/checkout@v4
        with:
          ref: main
          path: site

      - name: Checkout dev (staging)
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-build

      - name: Copia staging in /dev/
        run: |
          mkdir -p site/dev
          rsync -av \
            --exclude='.github' \
            --exclude='backup_locale' \
            --exclude='apps_script_prod_project' \
            --exclude='apps_script_dev_project' \
            --exclude='_strumenti' \
            --exclude='*.py' \
            --exclude='*.md' \
            dev-build/ site/dev/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          exclude_assets: '.github,backup_locale,apps_script_prod_project,apps_script_dev_project,_strumenti'
